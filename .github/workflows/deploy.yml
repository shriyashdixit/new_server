name: Deploy to Production

# Triggers on every push to main — runs on the self-hosted runner on the Pi.
#
# One-time runner setup (run on the Pi, not here):
#   1. Go to: GitHub → Repo Settings → Actions → Runners → New self-hosted runner
#   2. Select: Linux, ARM64
#   3. Follow the on-screen commands to download and register the runner
#   4. Install as a service so it survives reboots:
#        sudo ./svc.sh install
#        sudo ./svc.sh start

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Pull latest and rebuild
        working-directory: ${{ github.workspace }}
        run: |
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Verify health
        run: |
          sleep 10
          curl --fail --silent http://localhost:8000/health || \
            (echo "Health check failed" && docker logs new_server-web-1 --tail 50 && exit 1)
