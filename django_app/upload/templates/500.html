{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Nazukware</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <style>
        :root {
            --bg: #07111f;
            --text: #f4f7fb;
            --muted: #b7c4d6;
            --primary: #28c7fb;
            --primary-2: #0430b9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 24px;
        }

        a { color: inherit; text-decoration: none; }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            font-family: 'Syne', sans-serif;
            margin-bottom: 64px;
        }

        .brand-badge {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 4px 16px rgba(40,199,251,0.35);
        }

        .code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.75;
            max-width: 480px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #fff;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.97rem;
            box-shadow: 0 6px 20px rgba(40,199,251,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(40,199,251,0.45);
        }
    </style>
</head>
<body>
    <a href="/" class="brand">
        <span class="brand-badge">N</span>
        <span>Nazukware</span>
    </a>

    <div class="code">500</div>
    <h1>Something Went Wrong</h1>
    <p>An unexpected error occurred on our end. We've been notified and are looking into it. Please try again in a moment.</p>
    <a href="/" class="btn">Back to Home →</a>
</body>
</html>
